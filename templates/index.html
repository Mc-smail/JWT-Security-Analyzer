<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JWT Security Analyzer</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f3f4f6;
      color: #111827;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }

    .subtitle {
      color: #6b7280;
      margin-bottom: 24px;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      padding: 14px;
      font-family: monospace;
      font-size: 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: white;
    }

    button {
      margin-top: 12px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .card {
      margin-top: 24px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #0f172a;
      color: #e5e7eb;
      padding: 14px;
      border-radius: 8px;
    }

    .risk {
      font-size: 2rem;
      font-weight: bold;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      margin-left: 8px;
    }

    .critical { background:#fee2e2; color:#991b1b }
    .high { background:#ffedd5; color:#9a3412 }
    .warning { background:#fef3c7; color:#92400e }
    .success { background:#dcfce7; color:#166534 }

    .finding {
      margin-top:10px;
      padding:10px;
      border-radius:8px;
      background:#f9fafb;
      border:1px solid #e5e7eb;
    }

    .error {
      color:#b91c1c;
      margin-top:12px;
      font-weight:bold;
    }
  </style>
</head>

<body>

<h1>JWT Security Analyzer</h1>
<p class="subtitle">JWT einfügen und Sicherheitsanalyse starten.</p>

<textarea id="token" placeholder="JWT hier einfügen..."></textarea>
<br>
<button onclick="analyzeToken()">Analyze</button>
<button onclick="loadExample()">Example Token</button>
<button onclick="clearAll()">Clear</button>

<div id="error" class="error"></div>

<div class="card">
  <h2>Risk Score</h2>
  <div id="risk" class="risk">-</div>
</div>

<div class="card">
  <h2>Findings</h2>
  <div id="findings">Noch keine Analyse.</div>
</div>

<div class="grid">
  <div class="card">
    <h2>Header</h2>
    <pre id="header">Noch keine Analyse.</pre>
  </div>

  <div class="card">
    <h2>Payload</h2>
    <pre id="payload">Noch keine Analyse.</pre>
  </div>
</div>

<script>

function severityClass(score){
  if(score>=80) return "critical"
  if(score>=50) return "high"
  if(score>=20) return "warning"
  return "success"
}

async function analyzeToken(){

  const token=document.getElementById("token").value.trim()
  const errorEl=document.getElementById("error")

  const headerEl=document.getElementById("header")
  const payloadEl=document.getElementById("payload")
  const riskEl=document.getElementById("risk")
  const findingsEl=document.getElementById("findings")

  errorEl.textContent=""
  headerEl.textContent="Analyse läuft..."
  payloadEl.textContent="Analyse läuft..."
  findingsEl.textContent="Analyse läuft..."

  try{

    const response=await fetch("/analyze",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({token})
    })

    const data=await response.json()

    if(!response.ok){
      errorEl.textContent=data.detail||"Analyse Fehler"
      return
    }

    headerEl.textContent=JSON.stringify(data.header,null,2)
    payloadEl.textContent=JSON.stringify(data.payload,null,2)

    riskEl.textContent=data.risk_score+" / 100"

    const riskClass=severityClass(data.risk_score)
    riskEl.className="risk badge "+riskClass

    if(!data.findings||data.findings.length===0){
      findingsEl.innerHTML="<div class='finding success'>Keine Sicherheitsprobleme erkannt</div>"
      return
    }

    findingsEl.innerHTML=data.findings.map(f=>{

      const sev=(f.severity||"warning").toLowerCase()

      return `
      <div class="finding ${sev}">
        <strong>${f.issue}</strong>
        <span class="badge ${sev}">${sev}</span>
      </div>`

    }).join("")

  }
  catch(err){
    errorEl.textContent="Server nicht erreichbar"
  }

}

function loadExample(){

  document.getElementById("token").value =
  "eyJhbGciOiJub25lIn0.eyJzdWIiOiIxMjMiLCJwYXNzd29yZCI6IjEyMzQ1NiJ9."

}

function clearAll(){

  document.getElementById("token").value=""
  document.getElementById("header").textContent="Noch keine Analyse."
  document.getElementById("payload").textContent="Noch keine Analyse."
  document.getElementById("risk").textContent="-"
  document.getElementById("findings").textContent="Noch keine Analyse."
  document.getElementById("error").textContent=""

}

</script>


</body>
</html>
